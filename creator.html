      <button id="preview-btn" class="btn-pixel btn-blue" onclick="previewPlay()" style="margin-bottom: 20px;">▶ PREVIEW PLAY</button>
    </div>

    <!-- RIGHT SIDE: Scenario Form -->
    <div class="creator-right">
      <h2 class="title" style="font-size: 16px; margin-bottom: 20px; text-align: left;">SCENARIO CREATOR</h2>

      <form id="scenario-form" onsubmit="event.preventDefault();">
        <input type="hidden" id="scenario-id">
        
        <!-- SECTION 1: Scenario Text -->
        <div class="form-section">
          <div class="section-title">1️⃣ SCENARIO TEXT</div>
          <div class="form-group">
            <label for="scenario-title">SCENARIO TITLE</label>
            <input type="text" id="scenario-title" class="form-control" placeholder="e.g., Drill 001" required>
          </div>
          <div class="form-group">
            <label for="scenario-situation">SITUATION SUMMARY</label>
            <input type="text" id="scenario-situation" class="form-control" placeholder="e.g., Runner on 2nd, 1 Out" required>
          </div>
          <div class="form-group">
            <label for="scenario-details">DETAILS / INSTRUCTIONS</label>
            <textarea id="scenario-details" class="form-control" placeholder="Write instructions for the player..." required></textarea>
          </div>
        </div>

        <!-- SECTION 2: Field Setup -->
        <div class="form-section">
          <div class="section-title">2️⃣ FIELD SETUP</div>
          <div class="form-group">
            <label for="scenario-role">YOUR ROLE (PLAYER POSITION)</label>
            <select id="scenario-role" class="form-control" onchange="onRoleChanged()">
              <option value="hitter">🧤 HITTER</option>
              <option value="pitcher">🥎 PITCHER</option>
              <option value="catcher">🧤 CATCHER</option>
              <option value="1b">🧤 1ST BASE</option>
              <option value="2b">🧤 2ND BASE</option>
              <option value="3b" selected>🧤 3RD BASE</option>
              <option value="ss">🧤 SHORTSTOP</option>
              <option value="lf">🧤 LEFT FIELD</option>
              <option value="cf">🧤 CENTER FIELD</option>
              <option value="rf">🧤 RIGHT FIELD</option>
            </select>
          </div>
          <div class="form-group">
            <label>BASE RUNNERS</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="runner-1b-check" value="1b" onchange="onRunnersChanged()">
                <span class="checkbox-custom"></span> 1ST BASE
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="runner-2b-check" value="2b" onchange="onRunnersChanged()">
                <span class="checkbox-custom"></span> 2ND BASE
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="runner-3b-check" value="3b" onchange="onRunnersChanged()">
                <span class="checkbox-custom"></span> 3RD BASE
              </label>
            </div>
          </div>
        </div>

        <!-- SECTION 3: Hit Type -->
        <div class="form-section">
          <div class="section-title">3️⃣ THE HIT (PRE-DECISION)</div>
          <div class="form-group">
            <label for="scenario-hit-preset">BALL HIT TYPE</label>
            <select id="scenario-hit-preset" class="form-control">
              <!-- Dynamically populated from presets.js -->
            </select>
          </div>
        </div>

        <!-- SECTION 4: Quiz Question -->
        <div class="form-section">
          <div class="section-title">4️⃣ THE QUESTION</div>
          <div class="form-group">
            <label for="scenario-question">QUESTION</label>
            <input type="text" id="scenario-question" class="form-control" placeholder="What should you do?" required>
          </div>
          <div class="form-group">
            <label for="scenario-choice-0">CHOICE A</label>
            <input type="text" id="scenario-choice-0" class="form-control" placeholder="Option A" required>
          </div>
          <div class="form-group">
            <label for="scenario-choice-1">CHOICE B</label>
            <input type="text" id="scenario-choice-1" class="form-control" placeholder="Option B" required>
          </div>
          <div class="form-group">
            <label for="scenario-choice-2">CHOICE C</label>
            <input type="text" id="scenario-choice-2" class="form-control" placeholder="Option C" required>
          </div>
          <div class="form-group">
            <label for="scenario-correct">CORRECT CHOICE</label>
            <select id="scenario-correct" class="form-control">
              <option value="0">CHOICE A</option>
              <option value="1">CHOICE B</option>
              <option value="2">CHOICE C</option>
            </select>
          </div>
          <div class="form-group">
            <label for="scenario-why">EXPLANATION (WHY)</label>
            <textarea id="scenario-why" class="form-control" placeholder="Explanation shown to player after answering..." required></textarea>
          </div>
        </div>

        <!-- SECTION 5: Correct Play Outcome -->
        <div class="form-section">
          <div class="section-title">5️⃣ CORRECT ANSWER ACTION</div>
          <div class="form-group">
            <label for="scenario-outcome-preset">FIELD PLAY SEQUENCE</label>
            <select id="scenario-outcome-preset" class="form-control">
              <!-- Dynamically populated from presets.js -->
            </select>
          </div>
        </div>

        <button class="btn-pixel btn-green" onclick="saveScenario()" style="margin-bottom: 16px;">💾 SAVE DRILL</button>
      </form>

      <!-- Import/Export Scenarios -->
      <div class="form-section" style="margin-top: 10px;">
        <div class="section-title">📤 DRILL MANAGEMENT</div>
        <div class="import-export-wrap">
          <button class="btn-pixel btn-blue" onclick="exportDrills()" style="font-size: 8px;">EXPORT DRILLS</button>
          <button class="btn-pixel btn-blue" onclick="document.getElementById('import-file').click()" style="font-size: 8px;">IMPORT DRILLS</button>
          <input type="file" id="import-file" style="display: none;" onchange="importDrills(event)" accept=".json">
        </div>
      </div>

      <!-- Saved List -->
      <div class="form-section" style="margin-top: 10px;">
        <div class="section-title">📋 SAVED CUSTOM DRILLS</div>
        <div id="saved-scenarios-list" class="saved-list">
          <div style="font-size: 8px; color: #777; text-align: center; padding: 10px;">NO SAVED DRILLS YET.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- LOAD THE SCRIPTS SEQUENTIALLY -->
  <script src="js/audio.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/creator.js"></script>
</body>
</html>
