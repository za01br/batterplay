<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCENARIO 001</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1b0f;
      font-family: 'Press Start 2P', monospace;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 10px 32px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 900;
    }

    .title {
      font-size: 14px;
      color: #f0e040;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #806000, 0 0 16px rgba(240, 224, 64, 0.4);
      text-align: center;
      margin-bottom: 14px;
    }

    .field-wrap {
      width: 100%;
      max-width: 360px;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 0 1px #0d1b0f, 0 0 20px rgba(46, 204, 113, 0.2);
      margin-bottom: 14px;
      position: relative;
      background: #145a23;
    }

    #field-svg {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .status-bar {
      width: 100%;
      max-width: 360px;
      background: #081208;
      border: 2px solid #2ecc71;
      padding: 9px 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #2ecc71;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 9px;
      color: #f0e040;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    @keyframes blink {
      50% { opacity: 0 }
    }

    .pitch-btn-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 12px;
    }

    .pitch-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 15px 10px;
      background: #1a0000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .pitch-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
      filter: brightness(1.4);
    }

    .pitch-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }



    .pixel-dust {
      position: fixed;
      width: 4px;
      height: 4px;
      pointer-events: none;
      z-index: 1000;
      animation: dustfly 0.55s ease-out forwards;
    }

    @keyframes dustfly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ============ BATTER CAM DISPLAY ============ */
    #closeup-panel {
      width: 100%;
      max-width: 360px;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 0 1px #0d1b0f, 0 0 20px rgba(46, 204, 113, 0.2);
      margin-bottom: 14px;
      position: relative;
      background: #000;
      overflow: hidden;
      display: none;
    }

    #closeup-svg {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    /* CRACK text */
    #crack-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 12;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 8vw, 42px);
      color: #f0e040;
      text-shadow:
        3px 3px 0 #806000,
        -1px -1px 0 #ff6000,
        4px 0 0 #ff0000,
        -4px 0 0 #ff0000;
      letter-spacing: 2px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
    }

    /* Batter Cam label */
    #slowmo-label {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #f0e040;
      letter-spacing: 2px;
      z-index: 11;
      opacity: 1;
    }

    /* White flash overlay */
    #flash {
      position: absolute;
      inset: 0;
      background: white;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    /* ============ QUIZ OVERLAY ============ */
    #quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 970;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      padding: 24px 20px;
    }

    #quiz-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #quiz-question {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 4vw, 16px);
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 1px;
      margin-bottom: 28px;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      max-width: 360px;
    }

    .quiz-answer-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-choice-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 14px 14px;
      border: 3px solid;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      letter-spacing: 1px;
      width: 100%;
      text-align: left;
      transition: transform 0.08s, filter 0.08s;
    }

    .quiz-choice-btn .c-num {
      font-size: 12px;
      flex-shrink: 0;
      font-weight: bold;
    }

    .quiz-choice-btn[data-answer="1"] {
      background: #050e1a;
      border-color: #2980b9;
      color: #7ec8e3;
      box-shadow: 3px 3px 0 #2980b9;
    }
    .quiz-choice-btn[data-answer="2"] {
      background: #051a0a;
      border-color: #27ae60;
      color: #2ecc71;
      box-shadow: 3px 3px 0 #27ae60;
    }
    .quiz-choice-btn[data-answer="3"] {
      background: #1a0505;
      border-color: #e74c3c;
      color: #ff7675;
      box-shadow: 3px 3px 0 #e74c3c;
    }

    .quiz-choice-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0;
      filter: brightness(1.5);
    }

    /* ============ RESULT OVERLAY ============ */
    #result-overlay {
      position: fixed;
      inset: 0;
      z-index: 975;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      padding: 0 20px;
      box-sizing: border-box;
    }

    #result-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(20px, 7vw, 48px);
      letter-spacing: 4px;
      text-align: center;
      transform: scale(0);
      transition: none;
    }

    #result-text.correct {
      color: #2ecc71;
      text-shadow:
        3px 3px 0 #145a23,
        0 0 30px rgba(46, 204, 113, 0.8),
        0 0 60px rgba(46, 204, 113, 0.4);
    }

    #result-text.wrong {
      color: #e74c3c;
      text-shadow:
        3px 3px 0 #5a1414,
        0 0 30px rgba(231, 76, 60, 0.8),
        0 0 60px rgba(231, 76, 60, 0.4);
    }

    /* ============ ROLE MENU SCREEN ============ */
    #menu-screen {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 20px;
      background: #081208;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.25);
      margin-top: 30px;
      position: relative;
    }

    .menu-title {
      font-size: 16px;
      color: #f0e040;
      letter-spacing: 3px;
      text-shadow: 3px 3px 0 #806000, 0 0 10px rgba(240, 224, 64, 0.3);
      text-align: center;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .menu-subtitle {
      font-size: 7px;
      color: #2ecc71;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
      text-transform: uppercase;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .menu-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 16px 10px;
      background: #110000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      text-align: center;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .menu-btn:not(.disabled):hover {
      background: #2a0000;
      border-color: #fff;
      color: #fff;
      box-shadow: 4px 4px 0 #b38f00;
    }

    .menu-btn:not(.disabled):active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
    }

    .menu-btn.disabled {
      background: #1a1a1a;
      border: 3px solid #555;
      color: #777;
      box-shadow: 4px 4px 0 #222;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .menu-btn.disabled::after {
      content: 'LOCKED';
      font-size: 6px;
      color: #e74c3c;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #e74c3c;
      padding: 2px 4px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    #game-screen {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes you-glow-pulse {
      0%, 100% {
        opacity: 0.35;
        stroke: #f0e040;
        filter: drop-shadow(0 0 1px rgba(240, 224, 64, 0.4));
      }
      50% {
        opacity: 1;
        stroke: #ffffff;
        filter: drop-shadow(0 0 6px rgba(240, 224, 64, 0.8));
      }
    }
    @keyframes you-text-bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }
    #fielder-3b-you-glow {
      animation: you-glow-pulse 1.4s infinite ease-in-out;
    }
    #fielder-3b-you-text {
      animation: you-text-bob 1.4s infinite ease-in-out;
      transform-origin: 0px -66px;
    }
  </style>
</head>

<body>

  <!-- ============ ROLE MENU SCREEN ============ -->
  <div id="menu-screen">
    <div class="menu-title">BATTERPLAY</div>
    <div class="menu-subtitle">SELECT YOUR ROLE</div>
    <button class="menu-btn" onclick="selectRole('3rd_base')">🧤 3RD BASE</button>
    <button class="menu-btn" onclick="selectRole('hitter')">🥎 HITTER</button>
    <button class="menu-btn" onclick="toggleCustomDrillsMenu()">📋 CUSTOM DRILLS</button>
    <!-- Custom Drills Submenu -->
    <div id="custom-drills-list" style="display: none; width: 100%; max-height: 150px; overflow-y: auto; margin-top: 10px; border: 2px dashed #2ecc71; padding: 8px; background: #081208;">
      <!-- Populated via JS -->
    </div>
    <button class="menu-btn" onclick="window.location.href='creator.html'" style="background: #050e1a; border-color: #2980b9; color: #7ec8e3; box-shadow: 4px 4px 0 #154b6e; margin-top: 14px;">🎨 CREATE DRILLS</button>
  </div>

  <!-- ============ GAMEPLAY SCREEN ============ -->
  <div id="game-screen" style="display: none;">
    <button id="back-to-menu-btn" onclick="goBackToMenu()" style="align-self: flex-start; background: none; border: none; color: #2ecc71; font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; margin-bottom: 14px; padding: 4px 0; display: flex; align-items: center; gap: 4px; outline: none; -webkit-tap-highlight-color: transparent;">⬅️ BACK TO MENU</button>
    <div class="title">SCENARIO 001</div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <div id="status-text" class="status-text">LOADING...</div>
    </div>

    <div class="field-wrap">
    <svg id="field-svg" viewBox="0 -60 320 360" xmlns="http://www.w3.org/2000/svg">
      <!-- OUTFIELD GRASS -->
      <rect x="0" y="-60" width="320" height="360" fill="#1a7a30" />
      <rect x="0" y="-40" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="0" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="40" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="80" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="120" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="160" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="200" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="240" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="280" width="320" height="20" fill="#1d8535" />
      <!-- INFIELD GRASS -->
      <polygon points="160,58 262,160 160,262 58,160" fill="#1e8a36" />
      <polygon points="160,68 252,160 160,252 68,160" fill="#218f3a" />
      <polygon points="160,80 242,160 160,242 78,160" fill="#1e8a36" />
      <polygon points="160,94 230,160 160,228 90,160" fill="#218f3a" />
      <polygon points="160,108 218,160 160,214 102,160" fill="#1e8a36" />
      <polygon points="160,122 206,160 160,200 114,160" fill="#218f3a" />
      <polygon points="160,136 194,160 160,186 126,160" fill="#1e8a36" />

      <!-- SAND/DIRT RUNNING TRACKS & BASE PITS -->
      <!-- Home Plate Circle Area -->
      <ellipse cx="160" cy="266" rx="42" ry="28" fill="#c47c35" />
      <ellipse cx="160" cy="266" rx="36" ry="22" fill="#d08840" />

      <!-- 1st Base Circle Area -->
      <ellipse cx="262" cy="160" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="262" cy="160" rx="18" ry="12" fill="#d08840" />

      <!-- 2nd Base Circle Area -->
      <ellipse cx="160" cy="58" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="160" cy="58" rx="18" ry="12" fill="#d08840" />

      <!-- 3rd Base Circle Area -->
      <ellipse cx="58" cy="160" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="58" cy="160" rx="18" ry="12" fill="#d08840" />

      <!-- Main diamond base path tracks (connects the bases) -->
      <path d="M 160,266 L 262,160 L 160,58 L 58,160 Z" fill="none" stroke="#c47c35" stroke-width="20" stroke-linejoin="round" />
      <path d="M 160,266 L 262,160 L 160,58 L 58,160 Z" fill="none" stroke="#d08840" stroke-width="14" stroke-linejoin="round" />

      <!-- Dirt paths past 1B & 3B along foul lines to outfield grass edge -->
      <line x1="262" y1="160" x2="320" y2="106" stroke="#c47c35" stroke-width="20" stroke-linecap="round" />
      <line x1="262" y1="160" x2="320" y2="106" stroke="#d08840" stroke-width="14" stroke-linecap="round" />

      <line x1="58" y1="160" x2="0" y2="106" stroke="#c47c35" stroke-width="20" stroke-linecap="round" />
      <line x1="58" y1="160" x2="0" y2="106" stroke="#d08840" stroke-width="14" stroke-linecap="round" />
      <!-- FOUL LINES -->
      <line x1="160" y1="266" x2="0" y2="106" stroke="white" stroke-width="2.5" opacity="0.7" />
      <line x1="160" y1="266" x2="320" y2="106" stroke="white" stroke-width="2.5" opacity="0.7" />
      <!-- BASELINES -->
      <line x1="160" y1="266" x2="262" y2="160" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="262" y1="160" x2="160" y2="58" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="160" y1="58" x2="58" y2="160" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="58" y1="160" x2="160" y2="266" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <!-- PITCHER'S MOUND -->
      <ellipse cx="160" cy="162" rx="20" ry="14" fill="#bf7428" />
      <ellipse cx="160" cy="162" rx="15" ry="10" fill="#c98040" />
      <rect x="154" y="159" width="12" height="6" rx="1" fill="white" />
      <!-- BATTER'S BOXES -->
      <rect x="137" y="254" width="14" height="22" rx="1" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" />
      <rect x="169" y="254" width="14" height="22" rx="1" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" />
      <!-- BASES -->
      <polygon id="base-home" points="148,256 172,256 172,268 160,276 148,268" fill="white" stroke="#ccc" stroke-width="1" />
      <rect id="base-1b" x="254" y="152" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 262 160)" />
      <rect id="base-2b" x="152" y="50" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 160 58)" />
      <rect id="base-3b" x="50" y="152" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 58 160)" />
      <polygon id="hi-home" points="148,256 172,256 172,268 160,276 148,268" fill="#e74c3c" opacity="0" />
      <rect id="hi-1b" x="254" y="152" width="16" height="16" rx="1" fill="#27ae60" opacity="0" transform="rotate(45 262 160)" />
      <rect id="hi-2b" x="152" y="50" width="16" height="16" rx="1" fill="#2980b9" opacity="0" transform="rotate(45 160 58)" />
      <rect id="hi-3b" x="50" y="152" width="16" height="16" rx="1" fill="#e67e22" opacity="0" transform="rotate(45 58 160)" />
      <text x="280" y="156" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#27ae60">1B</text>
      <text x="152" y="42" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#2980b9">2B</text>
      <text x="26" y="156" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#e67e22">3B</text>
      <text x="147" y="295" font-family="'Courier New',monospace" font-size="7" font-weight="bold" fill="#e74c3c">HOME</text>
      <!-- BALL -->
      <g id="ball" transform="translate(160,155)" opacity="0">
        <circle cx="0" cy="0" r="4" fill="white" stroke="#ddd" stroke-width="0.5" />
        <path d="M -1,-3 Q 1,-2 1,0 Q 1,2 -1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
        <path d="M 1,-3 Q -1,-2 -1,0 Q -1,2 1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
      </g>
      <!-- POP-FLY BALL (separate, for arc animation) -->
      <g id="popfly-ball" transform="translate(160,248)" opacity="0">
        <circle cx="0" cy="0" r="4" fill="white" stroke="#ddd" stroke-width="0.5" />
        <path d="M -1,-3 Q 1,-2 1,0 Q 1,2 -1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
        <path d="M 1,-3 Q -1,-2 -1,0 Q -1,2 1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
      </g>

      <!-- Left Fielder -->
      <g id="fielder-lf" transform="translate(45,25) scale(0.65)">
        <ellipse cx="0" cy="2" rx="9" ry="3" fill="rgba(0,0,0,0.3)" />
        <rect x="-7" y="-3" width="5" height="4" rx="1" fill="#111" />
        <rect x="2" y="-3" width="5" height="4" rx="1" fill="#111" />
        <rect x="-7" y="-13" width="5" height="11" fill="#2c3e50" />
        <rect x="2" y="-13" width="5" height="11" fill="#2c3e50" />
        <rect x="-7" y="-10" width="5" height="3" fill="#e67e22" />
        <rect x="2" y="-10" width="5" height="3" fill="#e67e22" />
        <rect x="-8" y="-15" width="16" height="3" fill="#222" />
        <rect x="-8" y="-28" width="16" height="14" fill="#2c3e50" />
        <rect x="-8" y="-22" width="16" height="3" fill="#e67e22" />
        <rect x="-13" y="-26" width="5" height="5" rx="1" fill="#2c3e50" />
        <ellipse cx="-13" cy="-23" rx="4" ry="3.5" fill="#7a3810" />
        <ellipse cx="-13" cy="-23" rx="2.5" ry="2" fill="#9a4c20" />
        <g><rect x="8" y="-28" width="5" height="6" rx="1" fill="#2c3e50" /><rect x="10" y="-24" width="4" height="8" rx="1" fill="#f5c5a3" /></g>

    // ============================================================
    // WEB AUDIO API SOUND GENERATOR
    // ============================================================
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSelectSound() {
      initAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.setValueAtTime(900, now + 0.08);
      
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0.001, now + 0.18);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.18);
    }

    function playBatCrack() {
      initAudio();
      const now = audioCtx.currentTime;
      
      // Short impulse noise for the impact "tock"
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(320, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.08);
      
      // Short filtered noise burst for the "thwack" texture
      const bufferSize = audioCtx.sampleRate * 0.05;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1100;
      filter.Q.value = 1.8;
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.35, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      
      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      
      noise.start();
      noise.stop(now + 0.05);
    }

    function playCrowdCheer(duration, maxVolume = 0.25) {
      initAudio();
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      // White noise generator
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      // Filter 1 - Human voice range/cheering
      const filter1 = audioCtx.createBiquadFilter();
      filter1.type = 'bandpass';
      filter1.frequency.value = 950;
      filter1.Q.value = 1.3;

      // Filter 2 - High frequency cheers/whistling tones
      const filter2 = audioCtx.createBiquadFilter();
      filter2.type = 'bandpass';
      filter2.frequency.value = 1750;
      filter2.Q.value = 1.6;
      
      const gainNode = audioCtx.createGain();
      const now = audioCtx.currentTime;
      
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(maxVolume, now + 0.35); // rise
      gainNode.gain.linearRampToValueAtTime(maxVolume * 0.75, now + 1.2); // sustain slightly lower
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); // fade
      
      // Modulate frequencies to simulate wave of cheering
      filter1.frequency.setValueAtTime(850, now);
      filter1.frequency.exponentialRampToValueAtTime(1300, now + 0.4);
      filter1.frequency.linearRampToValueAtTime(950, now + duration);

      filter2.frequency.setValueAtTime(1550, now);
      filter2.frequency.exponentialRampToValueAtTime(2100, now + 0.45);
      filter2.frequency.linearRampToValueAtTime(1650, now + duration);

      source.connect(filter1);
      filter1.connect(gainNode);
      
      source.connect(filter2);
      filter2.connect(gainNode);
      
      gainNode.connect(audioCtx.destination);
      
      source.start();
      source.stop(now + duration);
    }

    function playGloveCatch() {
      initAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(60, now + 0.08);
      
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.08);
    }

    function playTagSound() {
      initAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.linearRampToValueAtTime(0.001, now + 0.1);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.1);
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function easeOutBounce(t) {
      if (t < 1 / 2.75) return 7.5625 * t * t;
      if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.75; }
      if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
      t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
    }

    function spawnDust(svgX, svgY, count = 8) {
      const svg = document.getElementById('field-svg');
      const r = svg.getBoundingClientRect();
      const sx = r.width / 320, sy = r.height / 300;
      const px = r.left + svgX * sx, py = r.top + svgY * sy;
      const colors = ['#f0e040', '#fff', '#c8873a', '#2ecc71', '#e74c3c', '#f5c5a3'];
      for (let i = 0; i < count; i++) {
        const d = document.createElement('div'); d.className = 'pixel-dust';
        const a = Math.random() * Math.PI * 2, dist = 15 + Math.random() * 30;
        d.style.setProperty('--dx', `${Math.cos(a) * dist}px`);
        d.style.setProperty('--dy', `${Math.sin(a) * dist}px`);
        d.style.left = px + 'px'; d.style.top = py + 'px';
        d.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(d); setTimeout(() => d.remove(), 600);
      }
    }

    function animate(duration, cb) {
      return new Promise(resolve => {
        const t0 = performance.now();
        function step(now) {
          const raw = Math.min((now - t0) / duration, 1);
          cb(raw);
          if (raw < 1) requestAnimationFrame(step); else resolve();
        }
        requestAnimationFrame(step);
      });
    }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

        const bx = lerp(148, target.x, e);

    async function triggerPitch() {
      if (isAnimating) return;
      if (isPlayAgain) {
        resetGame();
        return;
      }

      const scenario = activeScenarios[currentScenarioIndex];
      const isCustom = scenario.id.toString().startsWith('custom_');

      if (isCustom) {
        isAnimating = true;
        setDisabled(true);
        const glow = document.getElementById('you-glow');
        const text = document.getElementById('you-text');
        if (glow) glow.setAttribute('opacity', '0');
        if (text) text.setAttribute('opacity', '0');
        
        const hitPreset = HIT_PRESETS.find(h => h.id === scenario.hitPresetId) || HIT_PRESETS[0];
        
        await AnimationEngine.triggerPitch(currentRole, hitPreset, scenario.runners, () => {
          showQuizForScenario();
          setDisabled(false);
          isAnimating = false;
        });
        return;
      }

      isAnimating = true;
      setDisabled(true);

      // Hide YOU indicators when play begins
      const youText = document.getElementById('fielder-3b-you-text');
      const youGlow = document.getElementById('fielder-3b-you-glow');
      if (youText) youText.setAttribute('opacity', '0');
      if (youGlow) youGlow.setAttribute('opacity', '0');

      // Reset
      batGroup.setAttribute('transform', '');
      popflyBall.setAttribute('opacity', '0');

      if (currentRole === 'hitter') {
        // 1. WIND-UP
        await animate(400, t => {
          pitcherArm.setAttribute('transform', `rotate(${easeInOut(t) * -110}, 8, -22)`);
          pitcherG.setAttribute('transform', `translate(160,152) scale(${PLAYER_SCALE}) rotate(${easeInOut(t) * -5}, 0, -20)`);
        });
        await wait(120);

        // 2. THROW
        pitcherBallHand.setAttribute('opacity', '0');
        ballG.setAttribute('opacity', '1');
        ballG.setAttribute('transform', 'translate(160,145)');

        // Initialize closeup ball and swing prep
        cuBall.setAttribute('opacity', '1');
        cuBall.setAttribute('transform', 'translate(260, 40)');
        cuImpact.setAttribute('opacity', '0');
        crackText.style.opacity = '0';
        crackText.style.transform = 'translate(-50%,-50%) scale(0)';
        flashEl.style.opacity = '0';

        const throwP = animate(220, t => {
          const angle = -110 + easeOut(t) * 140;
          pitcherArm.setAttribute('transform', `rotate(${angle}, 8, -22)`);
          pitcherG.setAttribute('transform', `translate(160,152) scale(${PLAYER_SCALE}) rotate(${(1 - easeOut(t)) * -5}, 0, -20)`);
        });
        const ballTravelP = animate(280, t => {
          const e = easeOut(t);
          ballG.setAttribute('transform', `translate(${lerp(160, 148, e)},${lerp(145, 248, e) + Math.sin(t * Math.PI) * -8})`);
          
          // Sync closeup ball travel and swing prep in real-time
          const bx = lerp(260, 80, t);
          const by = lerp(40, 88, t);
          cuBall.setAttribute('transform', `translate(${bx},${by})`);
          
          const batAngle = t * 20;

          const bodyRotate = t * 6;
          cuBatter.setAttribute('transform', `translate(130,158) rotate(${bodyRotate}, 0, -80)`);
        });
        await Promise.all([throwP, ballTravelP]);

        // Stop here! Pitch has arrived.
        await wait(300);

        // Show quiz overlay dynamically
        showQuizForScenario();
      } else {

          pitcherArm.setAttribute('transform', `rotate(${easeInOut(t) * -110}, 8, -22)`);
          pitcherG.setAttribute('transform', `translate(160,152) scale(${PLAYER_SCALE}) rotate(${easeInOut(t) * -5}, 0, -20)`);

    async function playSwingAndHit() {

      spawnDust(148, 240, 12);

      cuImpact.setAttribute('opacity', '1');

      crackText.style.opacity = '1';
      crackText.style.transform = 'translate(-50%,-50%) scale(1)';

      // Flash closeup viewport
      flashEl.style.opacity = '0.95';

      // Field view pitched ball fades
      const hitP = animate(200, t => {
        ballG.setAttribute('opacity', String(1 - t));
      });

      // Closeup swing follow-through & ball ricochet
      const cuRicochetP = animate(300, t => {
        const e = easeInOut(t);
        const batAngle = 20 + e * 40;
        cuBatGroup.setAttribute('transform', `rotate(${batAngle}, -38, -60)`);
        const bodyRotate = 6 + e * 12;
        cuBatter.setAttribute('transform', `translate(130,158) rotate(${bodyRotate}, 0, -80)`);
        
        const bx = lerp(80, -30, e);
        const by = lerp(88, -20, e) - Math.sin(e * Math.PI) * 50;
        cuBall.setAttribute('transform', `translate(${bx},${by})`);
      });

      // 4. Scenario play outcome starts flying immediately on contact!
      const scenario = activeScenarios[currentScenarioIndex];
      const ballFlightP = playScenarioPlay(scenario.id);

      await Promise.all([flashFadeP, swingP, hitP, cuRicochetP, ballFlightP]);

      // Clean up field view pitch ball and closeup impact/ball
      flashEl.style.opacity = '0';
      ballG.setAttribute('opacity', '0');
      pitcherBallHand.setAttribute('opacity', '1');

      // Crack text wiggle
      await animate(200, t => {
        const angle = Math.sin(t * Math.PI * 4) * 5;
        crackText.style.transform = `translate(-50%,-50%) scale(1) rotate(${angle}deg)`;
      });
      await wait(200);

      // Fade out closeup impact and crack text
      const fadeOutP = animate(150, t => {
        crackText.style.opacity = String(1 - t);
      });
      await Promise.all([fadeOutP]);
      crackText.style.opacity = '0';
      cuImpact.setAttribute('opacity', '0');
      cuBall.setAttribute('opacity', '0');

      // Reset batter stance
      batGroup.setAttribute('transform', '');
      playerG.setAttribute('transform', `translate(${cur.x},${cur.y}) scale(${PLAYER_SCALE})`);
    }

    // ============================================================
    // SHOW QUIZ OVERLAY FOR CURRENT SCENARIO
    // ============================================================
    function showQuizForScenario() {
      const scenario = activeScenarios[currentScenarioIndex];
      
      document.getElementById('quiz-situation').textContent = scenario.details;
      document.getElementById('quiz-question').innerHTML = scenario.question;
      
      const choicesEl = document.getElementById('quiz-choices');
      choicesEl.innerHTML = '';
      
      scenario.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-choice-btn';
        btn.setAttribute('data-answer', String(index + 1));
        btn.onclick = () => chooseAnswer(index);
        
        btn.innerHTML = `
          <span class="c-num">${index + 1})</span> ${choice}
        `;
        choicesEl.appendChild(btn);
      });
      
      quizOverlay.classList.add('visible');
    }

    // ============================================================
    // QUIZ ANSWER HANDLER
    // ============================================================
    async function chooseAnswer(index) {
      if (!quizOverlay.classList.contains('visible')) return;

      // Hide quiz immediately
      quizOverlay.classList.remove('visible');

      const scenario = activeScenarios[currentScenarioIndex];
      const isCorrect = (index === scenario.correctIndex);
      const isCustom = scenario.id.toString().startsWith('custom_');

      if (isCustom) {
        if (isCorrect) {
          const hitPreset = HIT_PRESETS.find(h => h.id === scenario.hitPresetId) || HIT_PRESETS[0];
          const outcomePreset = OUTCOME_PRESETS.find(o => o.id === scenario.outcomePresetId) || OUTCOME_PRESETS[0];
          
          if (currentRole === 'hitter') {
            await AnimationEngine.playHitterCorrectHit(hitPreset, async () => {
              await AnimationEngine.playOutcomeSteps(outcomePreset.steps, scenario);
            });
          } else {
            await AnimationEngine.playOutcomeSteps(outcomePreset.steps, scenario);
          }
          await showResult(true, scenario.why);
          isAnimating = false;
          showNextButton();
        } else {
          if (currentRole === 'hitter') {
            await AnimationEngine.playHitterSwingMiss();
          }
          await showResult(false, scenario.why);
          isAnimating = false;
          showTryAgainButton();
        }
        return;
      }

      if (currentRole === 'hitter') {
        if (isCorrect) {
          // ✅ CORRECT
          // Play hit animation (swing, contact, ball flight, and base running)
          await playSwingAndHit();
          
          // Show result card
          await showResult(true, scenario.why);
          
          // Show NEXT button
          isAnimating = false;
          showNextButton();
        } else {
          // ❌ WRONG
          // Play swing and miss animation
          await playSwingAndMiss();
          
          // Show result card
          await showResult(false, scenario.why);
          
          isAnimating = false;
        }
      } else {
        // --- 3RD BASE ROLE ---
        if (isCorrect) {
          // ✅ CORRECT
          if (scenario.id === 103) {
            await playForcePlayAt3rd();
          } else if (scenario.id === 104) {
            await playStealTagAt3rd();
          } else if (scenario.id === 105) {
            await playThrowTo2nd();
          } else if (scenario.id === 106) {
            await playThrowTo1st();
          } else {
            await playCorrectTagPlay();
          }
          await showResult(true, scenario.why);
          isAnimating = false;
          showNextButton();
        } else {
          // ❌ WRONG
          await playIncorrectPlay(index);
          await showResult(false, scenario.why);
          isAnimating = false;
          showTryAgainButton();
        }
      }
    }

    // ============================================================
    // RESULT TEXT SHOW
    // ============================================================
    async function showResult(correct, explanation) {
      resultText.textContent = correct ? 'CORRECT!' : 'WRONG!';
      resultText.className = correct ? 'correct' : 'wrong';
      
      const expEl = document.getElementById('result-explanation');
      if (expEl) {
        expEl.textContent = explanation || '';
        expEl.style.opacity = '0';
        expEl.style.transform = 'translateY(10px)';
      }
      
      resultOverlay.style.opacity = '1';
      resultOverlay.style.pointerEvents = 'none';

      // Bounce in
      await animate(300, t => {
        const s = easeOutBounce(t) * 1.05;
        resultText.style.transform = `scale(${s})`;
      });

      if (expEl && explanation) {
        await wait(100);
        expEl.style.opacity = '1';
        expEl.style.transform = 'translateY(0)';
      }

      await wait(3000); // Give enough time to read explanation

      // Fade out
      await animate(300, t => {
        resultOverlay.style.opacity = String(1 - t);
      });
      resultOverlay.style.opacity = '0';
      resultText.style.transform = 'scale(0)';
      if (expEl) expEl.style.opacity = '0';
    }

    // ============================================================
    // GENERAL ELEMENT RUNNING ANIMATION WITH 2.5D DEPTH
    // ============================================================
    function runElementToBases(el, baseList) {
      return new Promise(async resolve => {
        let currentPos = { x: 148, y: 258 };
        const trans = el.getAttribute('transform');
        if (trans) {
          const match = trans.match(/translate\(([^,\s)]+)[,\s]([^)\s]+)\)/);
          if (match) {
            currentPos.x = parseFloat(match[1]);
            currentPos.y = parseFloat(match[2]);
          }
        }
        
        for (let i = 0; i < baseList.length; i++) {
          const targetBase = baseList[i];
          const target = BASE_POS[targetBase];
          const startX = currentPos.x, startY = currentPos.y;
          const dx = target.x - startX, dy = target.y - startY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 4) continue;
          
          const duration = Math.max(380, dist * 2.5);
          const t0 = performance.now();
          
          await animate(duration, t => {
            const easeT = easeInOut(t);
            const x = startX + dx * easeT;
            const y = startY + dy * easeT;
            const bobAmp = Math.min((dist / duration) * 140, 6);
            const bob = Math.sin(t * dist * 0.38) * bobAmp;
            const lean = (dx > 0 ? 1 : dx < 0 ? -1 : 0) * 4 * Math.sin(t * dist * 0.22);
            
            const scale = getScaleForY(y);
            el.setAttribute('transform', `translate(${x},${y + bob}) scale(${scale}) rotate(${lean}, 0, -20)`);
            currentPos.x = x;
            currentPos.y = y;
          });
          
          currentPos.x = target.x;
          currentPos.y = target.y;
          const scale = getScaleForY(target.y);
          el.setAttribute('transform', `translate(${target.x},${target.y}) scale(${scale})`);
          
          flashBase(targetBase);
          spawnDust(target.x, target.y - 20, 8);
          
          // Small bounce at base
          await new Promise(res => {
            const bx = currentPos.x, by = currentPos.y, t0 = performance.now();
            function b(now) {
              const t = (now - t0) / 300;
              if (t > 1) { 
                el.setAttribute('transform', `translate(${bx},${by}) scale(${scale})`); 
                res(); 
                return; 
              }
              const scaleNow = getScaleForY(by + Math.sin(t * Math.PI) * -8);
              el.setAttribute('transform', `translate(${bx},${by + Math.sin(t * Math.PI) * -8}) scale(${scaleNow})`);
              requestAnimationFrame(b);
            }
            requestAnimationFrame(b);
          });
        }
        resolve();
      });
    }

    // ============================================================

          popflyBall.setAttribute('opacity', '0');
          await wait(80);
          popflyBall.setAttribute('opacity', '1');
          await wait(80);

        // Runner tags from 3B to Home, Batter runs to 1B
        const run3bPromise = runElementToBases(document.getElementById('runner-3b'), ['home']);
        const batterPromise = runElementToBases(playerG, ['1b']);
        
        await Promise.all([run3bPromise, batterPromise]);
        showFloatingTag(document.getElementById('runner-3b'), 'SAFE', '#2ecc71');
