<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCENARIO 001</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1b0f;
      font-family: 'Press Start 2P', monospace;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 10px 32px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 900;
    }

    .title {
      font-size: 8px;
      color: #f0e040;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #806000, 0 0 16px rgba(240, 224, 64, 0.4);
      text-align: center;
      margin-bottom: 14px;
    }

    .field-wrap {
      width: 100%;
      max-width: 360px;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 0 1px #0d1b0f, 0 0 20px rgba(46, 204, 113, 0.2);
      margin-bottom: 14px;
      position: relative;
      background: #145a23;
    }

    #field-svg {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .status-bar {
      width: 100%;
      max-width: 360px;
      background: #081208;
      border: 2px solid #2ecc71;
      padding: 7px 10px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #2ecc71;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 6px;
      color: #f0e040;
      letter-spacing: 1px;
    }

    @keyframes blink {
      50% { opacity: 0 }
    }

    .pitch-btn-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 12px;
    }

    .pitch-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 15px 10px;
      background: #1a0000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .pitch-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
      filter: brightness(1.4);
    }

    .pitch-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }



    .pixel-dust {
      position: fixed;
      width: 4px;
      height: 4px;
      pointer-events: none;
      z-index: 1000;
      animation: dustfly 0.55s ease-out forwards;
    }

    @keyframes dustfly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ============ CINEMATIC CLOSE-UP OVERLAY ============ */
    #bar-top,
    #bar-bottom {
      position: fixed;
      left: 0;
      right: 0;
      height: 0px;
      background: #000;
      z-index: 951;
    }
    #bar-top { top: 0; }
    #bar-bottom { bottom: 0; }

    #closeup-panel {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 952;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    #closeup-svg {
      width: 100%;
      max-width: 420px;
      image-rendering: pixelated;
    }

    /* CRACK text */
    #crack-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 960;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(36px, 12vw, 56px);
      color: #f0e040;
      text-shadow:
        4px 4px 0 #806000,
        -2px -2px 0 #ff6000,
        6px 0 0 #ff0000,
        -6px 0 0 #ff0000;
      letter-spacing: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
    }

    /* Slow-mo label */
    #slowmo-label {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #f0e040;
      letter-spacing: 3px;
      z-index: 960;
      opacity: 0;
      padding-bottom: 8px;
    }

    /* White flash overlay */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 958;
      opacity: 0;
      pointer-events: none;
    }

    /* ============ QUIZ OVERLAY ============ */
    #quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 970;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      padding: 24px 20px;
    }

    #quiz-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #quiz-question {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 3.2vw, 14px);
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 1px;
      margin-bottom: 28px;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      max-width: 360px;
    }

    .quiz-answer-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-choice-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      padding: 14px 14px;
      border: 3px solid;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      letter-spacing: 1px;
      width: 100%;
      text-align: left;
      transition: transform 0.08s, filter 0.08s;
    }

    .quiz-choice-btn .c-num {
      font-size: 10px;
      flex-shrink: 0;
      font-weight: bold;
    }

    .quiz-choice-btn[data-answer="1"] {
      background: #050e1a;
      border-color: #2980b9;
      color: #7ec8e3;
      box-shadow: 3px 3px 0 #2980b9;
    }
    .quiz-choice-btn[data-answer="2"] {
      background: #051a0a;
      border-color: #27ae60;
      color: #2ecc71;
      box-shadow: 3px 3px 0 #27ae60;
    }
    .quiz-choice-btn[data-answer="3"] {
      background: #1a0505;
      border-color: #e74c3c;
      color: #ff7675;
      box-shadow: 3px 3px 0 #e74c3c;
    }

    .quiz-choice-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0;
      filter: brightness(1.5);
    }

    /* ============ RESULT OVERLAY ============ */
    #result-overlay {
      position: fixed;
      inset: 0;
      z-index: 975;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
    }

    #result-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(32px, 12vw, 60px);
      letter-spacing: 4px;
      text-align: center;
      transform: scale(0);
      transition: none;
    }

    #result-text.correct {
      color: #2ecc71;
      text-shadow:
        3px 3px 0 #145a23,
        0 0 30px rgba(46, 204, 113, 0.8),
        0 0 60px rgba(46, 204, 113, 0.4);
    }

    #result-text.wrong {
      color: #e74c3c;
      text-shadow:
        3px 3px 0 #5a1414,
        0 0 30px rgba(231, 76, 60, 0.8),
        0 0 60px rgba(231, 76, 60, 0.4);
    }

    /* ============ ROLE MENU SCREEN ============ */
    #menu-screen {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 20px;
      background: #081208;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.25);
      margin-top: 30px;
      position: relative;
    }

    .menu-title {
      font-size: 16px;
      color: #f0e040;
      letter-spacing: 3px;
      text-shadow: 3px 3px 0 #806000, 0 0 10px rgba(240, 224, 64, 0.3);
      text-align: center;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .menu-subtitle {
      font-size: 7px;
      color: #2ecc71;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
      text-transform: uppercase;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .menu-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 16px 10px;
      background: #110000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      text-align: center;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .menu-btn:not(.disabled):hover {
      background: #2a0000;
      border-color: #fff;
      color: #fff;
      box-shadow: 4px 4px 0 #b38f00;
    }

    .menu-btn:not(.disabled):active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
    }

    .menu-btn.disabled {
      background: #1a1a1a;
      border: 3px solid #555;
      color: #777;
      box-shadow: 4px 4px 0 #222;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .menu-btn.disabled::after {
      content: 'LOCKED';
      font-size: 6px;
      color: #e74c3c;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #e74c3c;
      padding: 2px 4px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    /* ============ GAMEPLAY SCREEN ============ */
    #game-screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>

  <script>
    // ============================================================
    // WEB AUDIO API SOUND GENERATOR
    // ============================================================
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playSelectSound() {
      initAudio();
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.setValueAtTime(900, now + 0.08);
      
      gain.gain.setValueAtTime(0.12, now);
      gain.gain.linearRampToValueAtTime(0.001, now + 0.18);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.18);
    }

    function playBatCrack() {
      initAudio();
      const now = audioCtx.currentTime;
      
      // Short impulse noise for the impact "tock"
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(320, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.08);
      
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(now + 0.08);
      
      // Short filtered noise burst for the "thwack" texture
      const bufferSize = audioCtx.sampleRate * 0.05;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1100;
      filter.Q.value = 1.8;
      
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.35, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
      
      noise.connect(filter);
      filter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      
      noise.start();
      noise.stop(now + 0.05);
    }

    function playCrowdCheer(duration, maxVolume = 0.25) {
      initAudio();
      const bufferSize = audioCtx.sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      // White noise generator
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      // Filter 1 - Human voice range/cheering
      const filter1 = audioCtx.createBiquadFilter();
      filter1.type = 'bandpass';
      filter1.frequency.value = 950;
      filter1.Q.value = 1.3;

      // Filter 2 - High frequency cheers/whistling tones
      const filter2 = audioCtx.createBiquadFilter();
      filter2.type = 'bandpass';
      filter2.frequency.value = 1750;
      filter2.Q.value = 1.6;
      
      const gainNode = audioCtx.createGain();
      const now = audioCtx.currentTime;
      
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(maxVolume, now + 0.35); // rise
      gainNode.gain.linearRampToValueAtTime(maxVolume * 0.75, now + 1.2); // sustain slightly lower
      gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration); // fade
      
      // Modulate frequencies to simulate wave of cheering
      filter1.frequency.setValueAtTime(850, now);
      filter1.frequency.exponentialRampToValueAtTime(1300, now + 0.4);
      filter1.frequency.linearRampToValueAtTime(950, now + duration);

      filter2.frequency.setValueAtTime(1550, now);
      filter2.frequency.exponentialRampToValueAtTime(2100, now + 0.45);
      filter2.frequency.linearRampToValueAtTime(1650, now + duration);

      source.connect(filter1);
      filter1.connect(gainNode);
      
      source.connect(filter2);
      filter2.connect(gainNode);
      
      gainNode.connect(audioCtx.destination);
      
      source.start();
      source.stop(now + duration);
    }

    function setStatus(txt) { statusEl.textContent = txt; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function easeOutBounce(t) {
      if (t < 1 / 2.75) return 7.5625 * t * t;
      if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.75; }
      if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
      t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
    }

    function setDisabled(on) {
      pitchBtn.disabled = on;
    }

    function clearHighlights() {
      Object.values(HI_IDS).forEach(id => document.getElementById(id).setAttribute('opacity', '0'));
    }

    function flashBase(base) {
      const el = document.getElementById(HI_IDS[base]);
      let n = 0;
      const iv = setInterval(() => {
        n++;
        el.setAttribute('opacity', n % 2 === 0 ? '0.85' : '0');
        if (n >= 8) { clearInterval(iv); el.setAttribute('opacity', '0'); }
      }, 85);
    }

    function spawnDust(svgX, svgY, count = 8) {
      const svg = document.getElementById('field-svg');
      const r = svg.getBoundingClientRect();
      const sx = r.width / 320, sy = r.height / 300;
      const px = r.left + svgX * sx, py = r.top + svgY * sy;
      const colors = ['#f0e040', '#fff', '#c8873a', '#2ecc71', '#e74c3c', '#f5c5a3'];
      for (let i = 0; i < count; i++) {
        const d = document.createElement('div'); d.className = 'pixel-dust';
        const a = Math.random() * Math.PI * 2, dist = 15 + Math.random() * 30;
        d.style.setProperty('--dx', `${Math.cos(a) * dist}px`);
        d.style.setProperty('--dy', `${Math.sin(a) * dist}px`);
        d.style.left = px + 'px'; d.style.top = py + 'px';
        d.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(d); setTimeout(() => d.remove(), 600);
      }
    }

    function animate(duration, cb) {
      return new Promise(resolve => {
        const t0 = performance.now();
        function step(now) {
          const raw = Math.min((now - t0) / duration, 1);
          cb(raw);
          if (raw < 1) requestAnimationFrame(step); else resolve();
        }
        requestAnimationFrame(step);
      });
    }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ============================================================
    // CINEMATIC CLOSE-UP SEQUENCE
    // ============================================================
    function positionCloseupPanel() {
      const vh = window.innerHeight;
      const barH = Math.round(vh * 0.14);
      const panelTop = barH;
      const panelH = vh - barH * 2;
      closeupPanel.style.top = panelTop + 'px';
      closeupPanel.style.height = panelH + 'px';
      crackText.style.top = (vh * 0.5) + 'px';
      slowmoLabel.style.bottom = barH + 4 + 'px';
    }

    async function playCinematicCloseup() {
      positionCloseupPanel();
      const vh = window.innerHeight;
      const barH = Math.round(vh * 0.14);

      // Reset closeup state
      cuBatGroup.setAttribute('transform', '');
      cuBall.setAttribute('opacity', '0');
      cuImpact.setAttribute('opacity', '0');
      crackText.style.opacity = '0';
      crackText.style.transform = 'translate(-50%,-50%) scale(0)';
      slowmoLabel.style.opacity = '0';
      cuBatter.setAttribute('transform', 'translate(130,158)');

      // 1. LETTERBOX BARS SLIDE IN
      await animate(280, t => {
        const h = Math.round(easeOut(t) * barH);
        barTop.style.height = h + 'px';
        barBottom.style.height = h + 'px';
      });

      // 2. PANEL FADES IN
      closeupPanel.style.opacity = '1';
      closeupPanel.style.top = barH + 'px';
      closeupPanel.style.height = (vh - barH * 2) + 'px';

      // White flash (impact!)
      flashEl.style.opacity = '0.95';
      await animate(120, t => { flashEl.style.opacity = String(0.95 * (1 - t)); });
      flashEl.style.opacity = '0';
      await wait(60);

      // 3. SLOW-MO LABEL
      slowmoLabel.style.opacity = '1';

      // 4. SLOW-MO SWING - Phase 1: Ball travels INTO the bat (~300ms)
      cuBall.setAttribute('opacity', '1');
      cuBall.setAttribute('transform', 'translate(260, 40)');

      await animate(300, t => {
        const e = t; // linear progression for incoming pitch
        const batAngle = e * 20;
        cuBatGroup.setAttribute('transform', `rotate(${batAngle}, -38, -60)`);
        const bodyRotate = e * 6;
        cuBatter.setAttribute('transform', `translate(130,158) rotate(${bodyRotate}, 0, -80)`);
        
        // Ball travels from pitcher direction to contact point (80, 88)
        const bx = lerp(260, 80, e);
        const by = lerp(40, 88, e);
        cuBall.setAttribute('transform', `translate(${bx},${by})`);
      });

      // 5. IMPACT starburst (coincides with contact at start of Phase 2)
      cuImpact.setAttribute('opacity', '1');
      cuImpact.setAttribute('transform', 'translate(130,158)');

      // Play audio feedback
      playBatCrack();
      playCrowdCheer(2.5, 0.22);

      // Phase 2: Ball ricochets off bat in slow-mo pop-fly arc upward (~600ms)
      await animate(600, t => {
        const e = easeInOut(t);
        const batAngle = 20 + e * 40;
        cuBatGroup.setAttribute('transform', `rotate(${batAngle}, -38, -60)`);
        const bodyRotate = 6 + e * 12;
        cuBatter.setAttribute('transform', `translate(130,158) rotate(${bodyRotate}, 0, -80)`);
        
        // Ball arcs upward-left (pop-fly) from contact point (80, 88) to off-screen (-30, -20)
        const bx = lerp(80, -30, e);
        const by = lerp(88, -20, e) - Math.sin(e * Math.PI) * 50;
        cuBall.setAttribute('transform', `translate(${bx},${by})`);
      });

      // 6. CRACK! TEXT POPS IN
      crackText.style.opacity = '1';
      await animate(200, t => {
        const s = easeOutBounce(t) * 1.1;
        crackText.style.transform = `translate(-50%,-50%) scale(${s})`;
      });
      await wait(500);

      // Crack text wiggle
      await animate(200, t => {
        const angle = Math.sin(t * Math.PI * 4) * 5;
        crackText.style.transform = `translate(-50%,-50%) scale(1.1) rotate(${angle}deg)`;
      });
      await wait(300);

      // 7. FADE OUT cinematic
      await animate(200, t => {
        crackText.style.opacity = String(1 - t);
        slowmoLabel.style.opacity = String(1 - t);
      });
      crackText.style.opacity = '0';
      slowmoLabel.style.opacity = '0';
      closeupPanel.style.opacity = '0';

      // Bars slide back up
      await animate(260, t => {
        const h = Math.round((1 - easeOut(t)) * barH);
        barTop.style.height = h + 'px';
        barBottom.style.height = h + 'px';
      });
      barTop.style.height = '0px';
      barBottom.style.height = '0px';

      // Reset
      cuImpact.setAttribute('opacity', '0');
      cuBall.setAttribute('opacity', '0');
    }

    // ============================================================
    // POP-FLY ANIMATION on field (ball arcs up and hangs)
    // ============================================================
    async function animatePopFly() {
      // Show ball arcing up from home plate to peak
      popflyBall.setAttribute('opacity', '1');
      popflyBall.setAttribute('transform', 'translate(148,248)');

      // Arc upward to center-ish field then stop (hang)
      await animate(600, t => {
        const e = easeOut(t);
        const bx = lerp(148, 160, e);
        const by = lerp(248, 80, e);
        const scale = 1 + Math.sin(t * Math.PI) * 0.15;
        popflyBall.setAttribute('transform', `translate(${bx},${by}) scale(${scale})`);
      });
      // Ball "hangs" at peak — stays visible
    }

    // ============================================================
    // RESET GAME STATE
    // ============================================================
    function resetGame() {
      isPlayAgain = false;
      pitchBtn.innerHTML = '⚾ THROW PITCH!';
      
      if (currentBase !== 'home') {
        // Dust at 1B
        spawnDust(BASE_POS['1b'].x, BASE_POS['1b'].y, 8);
        cur = { ...BATTER_HOME };
        playerG.setAttribute('transform', `translate(${cur.x},${cur.y})`);
        currentBase = 'home';
        clearHighlights();
        // Dust at home
        spawnDust(BATTER_HOME.x, BATTER_HOME.y, 8);
      }
      
      pitcherArm.setAttribute('transform', '');
      pitcherG.setAttribute('transform', 'translate(160,152)');
      pitcherBallHand.setAttribute('opacity', '1');
      batGroup.setAttribute('transform', '');
      ballG.setAttribute('opacity', '0');
      popflyBall.setAttribute('opacity', '0');
    }

    // ============================================================
    // PITCH SEQUENCE
    // ============================================================
    async function triggerPitch() {
      if (isAnimating) return;
      if (isPlayAgain) {
        resetGame();
        return;
      }
      isAnimating = true;
      setDisabled(true);

      if (currentBase !== 'home') {
        cur = { ...BATTER_HOME };
        playerG.setAttribute('transform', `translate(${cur.x},${cur.y})`);
        currentBase = 'home';
        clearHighlights();
      }

      // Reset
      batGroup.setAttribute('transform', '');
      popflyBall.setAttribute('opacity', '0');

      // 1. WIND-UP
      await animate(400, t => {
        pitcherArm.setAttribute('transform', `rotate(${easeInOut(t) * -110}, 8, -22)`);
        pitcherG.setAttribute('transform', `translate(160,152) rotate(${easeInOut(t) * -5}, 0, -20)`);
      });
      await wait(120);

      // 2. THROW
      pitcherBallHand.setAttribute('opacity', '0');
      ballG.setAttribute('opacity', '1');
      ballG.setAttribute('transform', 'translate(160,145)');

      const throwP = animate(220, t => {
        const angle = -110 + easeOut(t) * 140;
        pitcherArm.setAttribute('transform', `rotate(${angle}, 8, -22)`);
        pitcherG.setAttribute('transform', `translate(160,152) rotate(${(1 - easeOut(t)) * -5}, 0, -20)`);
      });
      const ballTravelP = animate(280, t => {
        const e = easeOut(t);
        ballG.setAttribute('transform', `translate(${lerp(160, 148, e)},${lerp(145, 248, e) + Math.sin(t * Math.PI) * -8})`);
      });
      await Promise.all([throwP, ballTravelP]);

      // 3. CONTACT SWING (field view, fast)
      spawnDust(148, 240, 12);

      const swingP = animate(200, t => {
        const e = easeOut(t);
        batGroup.setAttribute('transform', `rotate(${-30 + e * 180}, 8, -24)`);
        playerG.setAttribute('transform', `translate(${cur.x},${cur.y}) rotate(${e * 25}, 0, -20)`);
      });

      // pitched ball fades
      const hitP = animate(200, t => {
        ballG.setAttribute('opacity', String(1 - t));
      });

      await Promise.all([swingP, hitP]);
      ballG.setAttribute('opacity', '0');
      pitcherBallHand.setAttribute('opacity', '1');

      // 4. CINEMATIC CLOSE-UP
      await playCinematicCloseup();

      // 5. Pop-fly arc on field
      animatePopFly(); // don't await — let it play while quiz shows

      // 6. Brief pause then show quiz
      await wait(400);
      batGroup.setAttribute('transform', '');
      playerG.setAttribute('transform', `translate(${cur.x},${cur.y})`);

      // Show quiz overlay
      quizOverlay.classList.add('visible');

      // isAnimating stays true until user picks answer
    }

    // ============================================================
    // QUIZ ANSWER HANDLER
    // ============================================================
    async function chooseAnswer(choice) {
      if (!quizOverlay.classList.contains('visible')) return;

      // Hide quiz immediately
      quizOverlay.classList.remove('visible');

      if (choice === 2) {
        // ✅ CORRECT — run to 1st!
        playCrowdCheer(4.0, 0.35);
        await showResult(true);
        popflyBall.setAttribute('opacity', '0');
        await runToBase('1b', true);
      } else {
        // ❌ WRONG — just flash WRONG!
        await showResult(false);
        popflyBall.setAttribute('opacity', '0');
      }

      isAnimating = false;
      isPlayAgain = true;
      pitchBtn.innerHTML = '🔄 PLAY AGAIN';
      setDisabled(false);
    }

    // ============================================================
    // RESULT TEXT SHOW
    // ============================================================
    async function showResult(correct) {
      resultText.textContent = correct ? 'CORRECT!' : 'WRONG!';
      resultText.className = correct ? 'correct' : 'wrong';
      resultOverlay.style.opacity = '1';
      resultOverlay.style.pointerEvents = 'none';

      // Bounce in
      await animate(300, t => {
        const s = easeOutBounce(t) * 1.05;
        resultText.style.transform = `scale(${s})`;
      });

      await wait(1200);

      // Fade out
      await animate(300, t => {
        resultOverlay.style.opacity = String(1 - t);
      });
      resultOverlay.style.opacity = '0';
      resultText.style.transform = 'scale(0)';
    }

    // ============================================================
    // MANUAL BASE RUN
    // ============================================================
    function runToBase(base, fromPitch) {
      return new Promise(resolve => {
        const target = BASE_POS[base];
        const startX = cur.x, startY = cur.y;
        const dx = target.x - startX, dy = target.y - startY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 4) { resolve(); return; }
        const duration = Math.max(380, dist * 2.4);
        const t0 = performance.now();
        if (!fromPitch) { clearHighlights(); }
        function step(now) {
          const raw = Math.min((now - t0) / duration, 1);
          const t = easeInOut(raw);
          const x = startX + dx * t, y = startY + dy * t;
          const bobAmp = Math.min((dist / duration) * 140, 6);
          const bob = Math.sin(raw * dist * 0.38) * bobAmp;
          const lean = (dx > 0 ? 1 : dx < 0 ? -1 : 0) * 4 * Math.sin(raw * dist * 0.22);
          playerG.setAttribute('transform', `translate(${x},${y + bob}) rotate(${lean}, 0, -20)`);
          cur.x = x; cur.y = y;
          if (raw < 1) { runRaf = requestAnimationFrame(step); }
          else {
            cur.x = target.x; cur.y = target.y;
            playerG.setAttribute('transform', `translate(${target.x},${target.y})`);
            currentBase = base;
            flashBase(base);
            spawnDust(target.x, target.y - 20, 10);
            bouncePlayer(resolve);
          }
        }
        runRaf = requestAnimationFrame(step);
      });
    }

    function bouncePlayer(cb) {
      const bx = cur.x, by = cur.y, t0 = performance.now();
      function b(now) {
        const t = (now - t0) / 300;
        if (t > 1) { playerG.setAttribute('transform', `translate(${bx},${by})`); if (cb) cb(); return; }
        playerG.setAttribute('transform', `translate(${bx},${by + Math.sin(t * Math.PI) * -8})`);
        requestAnimationFrame(b);
      }
      requestAnimationFrame(b);
    }
  </script>
