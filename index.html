<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCENARIO 001</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1b0f;
      font-family: 'Press Start 2P', monospace;
      color: #e8f5e9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px 10px 32px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.07) 2px, rgba(0, 0, 0, 0.07) 4px);
      pointer-events: none;
      z-index: 900;
    }

    .title {
      font-size: 14px;
      color: #f0e040;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 #806000, 0 0 16px rgba(240, 224, 64, 0.4);
      text-align: center;
      margin-bottom: 14px;
    }

    .field-wrap {
      width: 100%;
      max-width: 360px;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 0 1px #0d1b0f, 0 0 20px rgba(46, 204, 113, 0.2);
      margin-bottom: 14px;
      position: relative;
      background: #145a23;
    }

    #field-svg {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    .status-bar {
      width: 100%;
      max-width: 360px;
      background: #081208;
      border: 2px solid #2ecc71;
      padding: 9px 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: #2ecc71;
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
    }

    .status-text {
      font-size: 9px;
      color: #f0e040;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    @keyframes blink {
      50% { opacity: 0 }
    }

    .pitch-btn-wrap {
      width: 100%;
      max-width: 360px;
      margin-bottom: 12px;
    }

    .pitch-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 15px 10px;
      background: #1a0000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .pitch-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
      filter: brightness(1.4);
    }

    .pitch-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }



    .pixel-dust {
      position: fixed;
      width: 4px;
      height: 4px;
      pointer-events: none;
      z-index: 1000;
      animation: dustfly 0.55s ease-out forwards;
    }

    @keyframes dustfly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ============ BATTER CAM DISPLAY ============ */
    #closeup-panel {
      width: 100%;
      max-width: 360px;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 0 1px #0d1b0f, 0 0 20px rgba(46, 204, 113, 0.2);
      margin-bottom: 14px;
      position: relative;
      background: #000;
      overflow: hidden;
      display: none;
    }

    #closeup-svg {
      width: 100%;
      display: block;
      image-rendering: pixelated;
    }

    /* CRACK text */
    #crack-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 12;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 8vw, 42px);
      color: #f0e040;
      text-shadow:
        3px 3px 0 #806000,
        -1px -1px 0 #ff6000,
        4px 0 0 #ff0000,
        -4px 0 0 #ff0000;
      letter-spacing: 2px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
    }

    /* Batter Cam label */
    #slowmo-label {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #f0e040;
      letter-spacing: 2px;
      z-index: 11;
      opacity: 1;
    }

    /* White flash overlay */
    #flash {
      position: absolute;
      inset: 0;
      background: white;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }

    /* ============ QUIZ OVERLAY ============ */
    #quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 970;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      padding: 24px 20px;
    }

    #quiz-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    #quiz-question {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 4vw, 16px);
      color: #ffffff;
      font-weight: bold;
      text-align: center;
      line-height: 1.8;
      letter-spacing: 1px;
      margin-bottom: 28px;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
      max-width: 360px;
    }

    .quiz-answer-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .quiz-choice-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      padding: 14px 14px;
      border: 3px solid;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      letter-spacing: 1px;
      width: 100%;
      text-align: left;
      transition: transform 0.08s, filter 0.08s;
    }

    .quiz-choice-btn .c-num {
      font-size: 12px;
      flex-shrink: 0;
      font-weight: bold;
    }

    .quiz-choice-btn[data-answer="1"] {
      background: #050e1a;
      border-color: #2980b9;
      color: #7ec8e3;
      box-shadow: 3px 3px 0 #2980b9;
    }
    .quiz-choice-btn[data-answer="2"] {
      background: #051a0a;
      border-color: #27ae60;
      color: #2ecc71;
      box-shadow: 3px 3px 0 #27ae60;
    }
    .quiz-choice-btn[data-answer="3"] {
      background: #1a0505;
      border-color: #e74c3c;
      color: #ff7675;
      box-shadow: 3px 3px 0 #e74c3c;
    }

    .quiz-choice-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0;
      filter: brightness(1.5);
    }

    /* ============ RESULT OVERLAY ============ */
    #result-overlay {
      position: fixed;
      inset: 0;
      z-index: 975;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      padding: 0 20px;
      box-sizing: border-box;
    }

    #result-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(20px, 7vw, 48px);
      letter-spacing: 4px;
      text-align: center;
      transform: scale(0);
      transition: none;
    }

    #result-text.correct {
      color: #2ecc71;
      text-shadow:
        3px 3px 0 #145a23,
        0 0 30px rgba(46, 204, 113, 0.8),
        0 0 60px rgba(46, 204, 113, 0.4);
    }

    #result-text.wrong {
      color: #e74c3c;
      text-shadow:
        3px 3px 0 #5a1414,
        0 0 30px rgba(231, 76, 60, 0.8),
        0 0 60px rgba(231, 76, 60, 0.4);
    }

    /* ============ ROLE MENU SCREEN ============ */
    #menu-screen {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px 20px;
      background: #081208;
      border: 3px solid #2ecc71;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.25);
      margin-top: 30px;
      position: relative;
    }
    .roles-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }
    .select-role-btn {
      padding: 10px 4px;
      font-size: 7px;
      letter-spacing: 1px;
      width: auto !important;
    }

    .menu-title {
      font-size: 16px;
      color: #f0e040;
      letter-spacing: 3px;
      text-shadow: 3px 3px 0 #806000, 0 0 10px rgba(240, 224, 64, 0.3);
      text-align: center;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .menu-subtitle {
      font-size: 7px;
      color: #2ecc71;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
      text-transform: uppercase;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .menu-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      width: 100%;
      padding: 16px 10px;
      background: #110000;
      border: 3px solid #f0e040;
      color: #f0e040;
      box-shadow: 4px 4px 0 #806000;
      cursor: pointer;
      letter-spacing: 2px;
      text-align: center;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .menu-btn:not(.disabled):hover {
      background: #2a0000;
      border-color: #fff;
      color: #fff;
      box-shadow: 4px 4px 0 #b38f00;
    }

    .menu-btn:not(.disabled):active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 #806000;
    }

    .menu-btn.disabled {
      background: #1a1a1a;
      border: 3px solid #555;
      color: #777;
      box-shadow: 4px 4px 0 #222;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .menu-btn.disabled::after {
      content: 'LOCKED';
      font-size: 6px;
      color: #e74c3c;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #e74c3c;
      padding: 2px 4px;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    #game-screen {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes you-glow-pulse {
      0%, 100% {
        opacity: 0.3;
        stroke: #f0e040;
        filter: drop-shadow(0 0 1px rgba(240, 224, 64, 0.4));
      }
      50% {
        opacity: 1;
        stroke: #ffffff;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
      }
    }
    @keyframes you-text-bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px);
      }
    }
    @keyframes you-text-blink {
      0%, 100% {
        fill: #f0e040;
      }
      50% {
        fill: #ffffff;
      }
    }
    .you-glow {
      animation: you-glow-pulse 0.8s infinite ease-in-out;
    }
    .you-text {
      animation: you-text-bob 1.2s infinite ease-in-out, you-text-blink 0.8s infinite ease-in-out;
      transform-origin: 0px -66px;
      paint-order: stroke fill;
      fill: #f0e040 !important;
      stroke: #000000 !important;
      stroke-width: 1px !important;
    }
  </style>
</head>

<body>

  <!-- ============ ROLE MENU SCREEN ============ -->
  <div id="menu-screen">
    <div class="menu-title">BATTERPLAY</div>
    <div class="menu-subtitle">SELECT YOUR ROLE</div>
    <div class="roles-grid">
      <button class="menu-btn select-role-btn" onclick="selectRole('hitter')">🥎 HITTER</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('pitcher')">⚾ PITCHER</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('catcher')">🧤 CATCHER</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('1b')">🧤 1ST BASE</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('2b')">🧤 2ND BASE</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('3b')">🧤 3RD BASE</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('ss')">🧤 SHORTSTOP</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('lf')">🧤 LEFT FLD</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('cf')">🧤 CENTER FLD</button>
      <button class="menu-btn select-role-btn" onclick="selectRole('rf')">🧤 RIGHT FLD</button>
    </div>
    <button class="menu-btn" onclick="toggleCustomDrillsMenu()" style="margin-top: 8px;">📋 CUSTOM DRILLS</button>
    <!-- Custom Drills Submenu -->
    <div id="custom-drills-list" style="display: none; width: 100%; max-height: 150px; overflow-y: auto; margin-top: 10px; border: 2px dashed #2ecc71; padding: 8px; background: #081208;">
      <!-- Populated via JS -->
    </div>
    <button class="menu-btn" onclick="window.location.href='creator.html'" style="background: #050e1a; border-color: #2980b9; color: #7ec8e3; box-shadow: 4px 4px 0 #154b6e;">🎨 CREATE DRILLS</button>
  </div>

  <!-- ============ GAMEPLAY SCREEN ============ -->
  <div id="game-screen" style="display: none;">
    <button id="back-to-menu-btn" onclick="goBackToMenu()" style="align-self: flex-start; background: none; border: none; color: #2ecc71; font-family: 'Press Start 2P', monospace; font-size: 8px; cursor: pointer; margin-bottom: 14px; padding: 4px 0; display: flex; align-items: center; gap: 4px; outline: none; -webkit-tap-highlight-color: transparent;">⬅️ BACK TO MENU</button>
    <div class="title">SCENARIO 001</div>

    <div class="status-bar">
      <div class="status-dot"></div>
      <div id="status-text" class="status-text">LOADING...</div>
    </div>

    <div class="field-wrap">
    <svg id="field-svg" viewBox="0 -60 320 360" xmlns="http://www.w3.org/2000/svg">
      <!-- OUTFIELD GRASS -->
      <rect x="0" y="-60" width="320" height="360" fill="#1a7a30" />
      <rect x="0" y="-40" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="0" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="40" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="80" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="120" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="160" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="200" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="240" width="320" height="20" fill="#1d8535" />
      <rect x="0" y="280" width="320" height="20" fill="#1d8535" />
      <!-- INFIELD GRASS -->
      <polygon points="160,58 262,160 160,262 58,160" fill="#1e8a36" />
      <polygon points="160,68 252,160 160,252 68,160" fill="#218f3a" />
      <polygon points="160,80 242,160 160,242 78,160" fill="#1e8a36" />
      <polygon points="160,94 230,160 160,228 90,160" fill="#218f3a" />
      <polygon points="160,108 218,160 160,214 102,160" fill="#1e8a36" />
      <polygon points="160,122 206,160 160,200 114,160" fill="#218f3a" />
      <polygon points="160,136 194,160 160,186 126,160" fill="#1e8a36" />

      <!-- SAND/DIRT RUNNING TRACKS & BASE PITS -->
      <!-- Home Plate Circle Area -->
      <ellipse cx="160" cy="266" rx="42" ry="28" fill="#c47c35" />
      <ellipse cx="160" cy="266" rx="36" ry="22" fill="#d08840" />

      <!-- 1st Base Circle Area -->
      <ellipse cx="262" cy="160" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="262" cy="160" rx="18" ry="12" fill="#d08840" />

      <!-- 2nd Base Circle Area -->
      <ellipse cx="160" cy="58" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="160" cy="58" rx="18" ry="12" fill="#d08840" />

      <!-- 3rd Base Circle Area -->
      <ellipse cx="58" cy="160" rx="24" ry="16" fill="#c47c35" />
      <ellipse cx="58" cy="160" rx="18" ry="12" fill="#d08840" />

      <!-- Main diamond base path tracks (connects the bases) -->
      <path d="M 160,266 L 262,160 L 160,58 L 58,160 Z" fill="none" stroke="#c47c35" stroke-width="20" stroke-linejoin="round" />
      <path d="M 160,266 L 262,160 L 160,58 L 58,160 Z" fill="none" stroke="#d08840" stroke-width="14" stroke-linejoin="round" />

      <!-- Dirt paths past 1B & 3B along foul lines to outfield grass edge -->
      <line x1="262" y1="160" x2="320" y2="106" stroke="#c47c35" stroke-width="20" stroke-linecap="round" />
      <line x1="262" y1="160" x2="320" y2="106" stroke="#d08840" stroke-width="14" stroke-linecap="round" />

      <line x1="58" y1="160" x2="0" y2="106" stroke="#c47c35" stroke-width="20" stroke-linecap="round" />
      <line x1="58" y1="160" x2="0" y2="106" stroke="#d08840" stroke-width="14" stroke-linecap="round" />
      <!-- FOUL LINES -->
      <line x1="160" y1="266" x2="0" y2="106" stroke="white" stroke-width="2.5" opacity="0.7" />
      <line x1="160" y1="266" x2="320" y2="106" stroke="white" stroke-width="2.5" opacity="0.7" />
      <!-- BASELINES -->
      <line x1="160" y1="266" x2="262" y2="160" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="262" y1="160" x2="160" y2="58" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="160" y1="58" x2="58" y2="160" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <line x1="58" y1="160" x2="160" y2="266" stroke="white" stroke-width="2" opacity="0.55" stroke-dasharray="5,4" />
      <!-- PITCHER'S MOUND -->
      <ellipse cx="160" cy="162" rx="20" ry="14" fill="#bf7428" />
      <ellipse cx="160" cy="162" rx="15" ry="10" fill="#c98040" />
      <rect x="154" y="159" width="12" height="6" rx="1" fill="white" />
      <!-- BATTER'S BOXES -->
      <rect x="137" y="254" width="14" height="22" rx="1" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" />
      <rect x="169" y="254" width="14" height="22" rx="1" fill="none" stroke="white" stroke-width="1.5" opacity="0.6" />
      <!-- BASES -->
      <polygon id="base-home" points="148,256 172,256 172,268 160,276 148,268" fill="white" stroke="#ccc" stroke-width="1" />
      <rect id="base-1b" x="254" y="152" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 262 160)" />
      <rect id="base-2b" x="152" y="50" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 160 58)" />
      <rect id="base-3b" x="50" y="152" width="16" height="16" rx="1" fill="white" stroke="#ddd" stroke-width="1" transform="rotate(45 58 160)" />
      <polygon id="hi-home" points="148,256 172,256 172,268 160,276 148,268" fill="#e74c3c" opacity="0" />
      <rect id="hi-1b" x="254" y="152" width="16" height="16" rx="1" fill="#27ae60" opacity="0" transform="rotate(45 262 160)" />
      <rect id="hi-2b" x="152" y="50" width="16" height="16" rx="1" fill="#2980b9" opacity="0" transform="rotate(45 160 58)" />
      <rect id="hi-3b" x="50" y="152" width="16" height="16" rx="1" fill="#e67e22" opacity="0" transform="rotate(45 58 160)" />
      <text x="280" y="156" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#27ae60">1B</text>
      <text x="152" y="42" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#2980b9">2B</text>
      <text x="26" y="156" font-family="'Courier New',monospace" font-size="8" font-weight="bold" fill="#e67e22">3B</text>
      <text x="147" y="295" font-family="'Courier New',monospace" font-size="7" font-weight="bold" fill="#e74c3c">HOME</text>
      <!-- BALL -->
      <g id="ball" transform="translate(160,155)" opacity="0">
        <circle cx="0" cy="0" r="4" fill="white" stroke="#ddd" stroke-width="0.5" />
        <path d="M -1,-3 Q 1,-2 1,0 Q 1,2 -1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
        <path d="M 1,-3 Q -1,-2 -1,0 Q -1,2 1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
      </g>
      <!-- POP-FLY BALL (separate, for arc animation) -->
      <g id="popfly-ball" transform="translate(160,248)" opacity="0">
        <circle cx="0" cy="0" r="4" fill="white" stroke="#ddd" stroke-width="0.5" />
        <path d="M -1,-3 Q 1,-2 1,0 Q 1,2 -1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
        <path d="M 1,-3 Q -1,-2 -1,0 Q -1,2 1,3" fill="none" stroke="#cc3333" stroke-width="0.8" />
      </g>

      <!-- Left Fielder -->
      <g id="fielder-lf" transform="translate(45,25) scale(0.65)">
        <ellipse cx="0" cy="2" rx="9" ry="3" fill="rgba(0,0,0,0.3)" />
        <rect x="-7" y="-3" width="5" height="4" rx="1" fill="#111" />
        <rect x="2" y="-3" width="5" height="4" rx="1" fill="#111" />

    function setupRunnersClones() {
      const svg = document.getElementById('field-svg');
      const player = document.getElementById('player');
      if (!player) return;
      
      ['runner-1b', 'runner-2b', 'runner-3b'].forEach(id => {
        let runner = document.getElementById(id);
        if (!runner) {
          runner = player.cloneNode(true);
          runner.id = id;
          const bat = runner.querySelector('#bat-group') || runner.querySelector('[id*="bat"]');
          if (bat) bat.remove();
          runner.setAttribute('opacity', '0');
          svg.insertBefore(runner, document.getElementById('ball'));
        }
      });
    }

    function setupBaseRunners() {
      setupRunnersClones();
      
      ['runner-1b', 'runner-2b', 'runner-3b'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.setAttribute('opacity', '0');
      });
      
      const scenario = activeScenarios[currentScenarioIndex];
      scenario.runners.forEach(base => {
        let el = document.getElementById('runner-' + base);
        if (el) {
          const pos = BASE_POS[base];
          const scale = getScaleForY(pos.y);
          el.setAttribute('transform', `translate(${pos.x},${pos.y}) scale(${scale})`);
          el.setAttribute('opacity', '1');
        }
      });
    }

    function setupScenario() {
      const scenario = activeScenarios[currentScenarioIndex];
      document.querySelector('.title').textContent = `${scenario.title}: ${scenario.situation.toUpperCase()}`;
      setStatus(scenario.details);
      
      setupBaseRunners();
      
      const pitchBtn = document.getElementById('pitch-btn');
      pitchBtn.style.display = 'block';
      if (currentRole === 'hitter') {
        pitchBtn.innerHTML = '⚾ THROW PITCH!';
      } else {
        pitchBtn.innerHTML = '⚾ START PLAY!';
      }
      pitchBtn.disabled = false;
      document.getElementById('next-btn').style.display = 'none';
      
      isPlayAgain = false;
      isAnimating = false;

      // Handle YOU glow and text dynamically
      updateYouIndicator(currentRole);
    }

    function updateYouIndicator(role) {
      const glow = document.getElementById('you-glow');
      const text = document.getElementById('you-text');
      if (!glow || !text) return;
      
      glow.remove();
      text.remove();
      
      let parent = null;
      let y = -68;
      
      if (role === 'hitter') {
        parent = document.getElementById('player');
      } else if (role === 'catcher') {
        parent = document.getElementById('catcher');
        y = -52;
      } else {
        const positionIdMap = {
          'pitcher': 'pitcher',
          'catcher': 'catcher',
          '1b': 'fielder-1b',
          '2b': 'fielder-2b',
          '3b': 'fielder-3b',
          'ss': 'fielder-ss',
          'lf': 'fielder-lf',
          'cf': 'fielder-cf',
          'rf': 'fielder-rf'
        };
        const id = positionIdMap[role] || 'fielder-3b';
        parent = document.getElementById(id);
      }
      
      if (parent) {
        parent.appendChild(glow);
        parent.appendChild(text);
        glow.setAttribute('display', 'inline');
        text.setAttribute('display', 'inline');
        glow.setAttribute('opacity', '1');
        text.setAttribute('opacity', '1');
        text.setAttribute('y', String(y));
      } else {
        glow.setAttribute('display', 'none');
        text.setAttribute('display', 'none');
        glow.setAttribute('opacity', '0');
        text.setAttribute('opacity', '0');
      }
    }

    function populateCustomDrillsList() {
      const list = document.getElementById('custom-drills-list');
      if (!list) return;
      list.innerHTML = '';
      
      const scenarios = ScenarioStorage.getAll();
      if (scenarios.length === 0) {
        list.innerHTML = '<div style="font-size: 8px; color: #777; padding: 10px; text-align: center;">NO CUSTOM DRILLS FOUND.<br><br>CREATE THEM IN THE SCENARIO CREATOR!</div>';
        return;
      }
      
      scenarios.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'menu-btn';
        btn.style.padding = '8px';
        btn.style.fontSize = '8px';
        btn.style.marginBottom = '6px';
        btn.style.textTransform = 'none';
        btn.onclick = () => selectCustomDrill(s.id);
        btn.textContent = `${s.title.toUpperCase()}: ${s.situation.toUpperCase()}`;
        list.appendChild(btn);
      });
    }

      document.getElementById('menu-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
      
      resetGame();
      setupScenario();
    }

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function easeOutBounce(t) {
      if (t < 1 / 2.75) return 7.5625 * t * t;
      if (t < 2 / 2.75) { t -= 1.5 / 2.75; return 7.5625 * t * t + 0.75; }
      if (t < 2.5 / 2.75) { t -= 2.25 / 2.75; return 7.5625 * t * t + 0.9375; }
      t -= 2.625 / 2.75; return 7.5625 * t * t + 0.984375;
    }

    function setDisabled(on) {
      pitchBtn.disabled = on;
    }

    function clearHighlights() {
      Object.values(HI_IDS).forEach(id => document.getElementById(id).setAttribute('opacity', '0'));
    }

    function flashBase(base) {
      const el = document.getElementById(HI_IDS[base]);
      let n = 0;
      const iv = setInterval(() => {
        n++;
        el.setAttribute('opacity', n % 2 === 0 ? '0.85' : '0');
        if (n >= 8) { clearInterval(iv); el.setAttribute('opacity', '0'); }
      }, 85);
    }

    function spawnDust(svgX, svgY, count = 8) {
      const svg = document.getElementById('field-svg');
      const r = svg.getBoundingClientRect();
      const sx = r.width / 320, sy = r.height / 300;
      const px = r.left + svgX * sx, py = r.top + svgY * sy;
      const colors = ['#f0e040', '#fff', '#c8873a', '#2ecc71', '#e74c3c', '#f5c5a3'];
      for (let i = 0; i < count; i++) {
        const d = document.createElement('div'); d.className = 'pixel-dust';
        const a = Math.random() * Math.PI * 2, dist = 15 + Math.random() * 30;
        d.style.setProperty('--dx', `${Math.cos(a) * dist}px`);
        d.style.setProperty('--dy', `${Math.sin(a) * dist}px`);
        d.style.left = px + 'px'; d.style.top = py + 'px';
        d.style.background = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(d); setTimeout(() => d.remove(), 600);
      }
    }

    function animate(duration, cb) {
      return new Promise(resolve => {
        const t0 = performance.now();
        function step(now) {
          const raw = Math.min((now - t0) / duration, 1);
          cb(raw);
          if (raw < 1) requestAnimationFrame(step); else resolve();
        }
        requestAnimationFrame(step);
      });
    }
    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Cinematic close-up sequence removed. Replaced by persistent real-time Batter Cam stacked below the field.



    // ============================================================
    // RESET GAME STATE
    // ============================================================
    function resetGame() {
      isPlayAgain = false;
      
      const pitchBtn = document.getElementById('pitch-btn');
      if (currentRole === 'hitter') {
        pitchBtn.innerHTML = '⚾ THROW PITCH!';
      } else {
        pitchBtn.innerHTML = '⚾ START PLAY!';
      }
      
      cur = { ...BATTER_HOME };
      playerG.setAttribute('transform', `translate(${cur.x},${cur.y}) scale(${PLAYER_SCALE})`);
      playerG.setAttribute('opacity', '1');
      currentBase = 'home';
      clearHighlights();
      
      pitcherArm.setAttribute('transform', '');
      pitcherBallHand.setAttribute('opacity', '1');
      batGroup.setAttribute('transform', '');
      ballG.setAttribute('opacity', '0');
      popflyBall.setAttribute('opacity', '0');
      
      // Reset all defensive fielders to their default positions
      for (const key in POSITION_COORDS) {
        const info = POSITION_COORDS[key];
        const el = document.getElementById(info.id);
        if (el) {
          el.setAttribute('transform', `translate(${info.x},${info.y}) scale(${PLAYER_SCALE})`);
          el.setAttribute('opacity', '1');
        }
      }
      
      setupBaseRunners();
    }

    // ============================================================
    // PITCH SEQUENCE
    // ============================================================
    async function triggerPitch() {
      if (isAnimating) return;
      if (isPlayAgain) {
        resetGame();
        return;
      }

      isAnimating = true;
      setDisabled(true);

      const scenario = activeScenarios[currentScenarioIndex];

      // Hide YOU indicators when play begins
      const glow = document.getElementById('you-glow');
      const text = document.getElementById('you-text');
      if (glow) {
        glow.setAttribute('display', 'none');
        glow.setAttribute('opacity', '0');
      }
      if (text) {
        text.setAttribute('display', 'none');
        text.setAttribute('opacity', '0');
      }

      const hitPreset = HIT_PRESETS.find(h => h.id === scenario.hitPresetId) || HIT_PRESETS[0];
      
      await AnimationEngine.triggerPitch(currentRole, hitPreset, scenario.runners, () => {
        showQuizForScenario();
        setDisabled(false);
        isAnimating = false;
      });
    }



    // ============================================================
    // SHOW QUIZ OVERLAY FOR CURRENT SCENARIO
    // ============================================================
    function showQuizForScenario() {
      const scenario = activeScenarios[currentScenarioIndex];
      
      document.getElementById('quiz-situation').textContent = scenario.details;
      document.getElementById('quiz-question').innerHTML = scenario.question;
      
      const choicesEl = document.getElementById('quiz-choices');
      choicesEl.innerHTML = '';
      
      scenario.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'quiz-choice-btn';
        btn.setAttribute('data-answer', String(index + 1));
        btn.onclick = () => chooseAnswer(index);
        
        btn.innerHTML = `
          <span class="c-num">${index + 1})</span> ${choice}
        `;
        choicesEl.appendChild(btn);
      });
      
      quizOverlay.classList.add('visible');
    }


    // ============================================================
    // QUIZ ANSWER HANDLER
    // ============================================================
    async function chooseAnswer(index) {
      if (!quizOverlay.classList.contains('visible')) return;

      // Hide quiz immediately
      quizOverlay.classList.remove('visible');

      const scenario = activeScenarios[currentScenarioIndex];
      const isCorrect = (index === scenario.correctIndex);

      if (isCorrect) {
        const hitPreset = HIT_PRESETS.find(h => h.id === scenario.hitPresetId) || HIT_PRESETS[0];
        const outcomePreset = OUTCOME_PRESETS.find(o => o.id === scenario.outcomePresetId) || OUTCOME_PRESETS[0];
        
        if (currentRole === 'hitter') {
          await AnimationEngine.playHitterCorrectHit(hitPreset, async () => {
            await AnimationEngine.playOutcomeSteps(outcomePreset.steps, scenario);
          });
        } else {
          await AnimationEngine.playOutcomeSteps(outcomePreset.steps, scenario);
        }
        await showResult(true, scenario.why);
        isAnimating = false;
        showNextButton();
      } else {
        if (currentRole === 'hitter') {
          await AnimationEngine.playHitterSwingMiss();
        }
        await showResult(false, scenario.why);
        isAnimating = false;
        showTryAgainButton();
      }
    }

    function showNextButton() {
      const pitchBtn = document.getElementById('pitch-btn');
      const nextBtn = document.getElementById('next-btn');
      
      pitchBtn.style.display = 'none';
      nextBtn.style.display = 'block';
      
      if (currentScenarioIndex === activeScenarios.length - 1) {
        nextBtn.innerHTML = '🏆 REPLAY ALL SCENARIOS 🏆';
      } else {
        nextBtn.innerHTML = 'NEXT SCENARIO ➡️';
      }
      setDisabled(false);
    }

    function showTryAgainButton() {
      const pitchBtn = document.getElementById('pitch-btn');
      const nextBtn = document.getElementById('next-btn');
      
      pitchBtn.style.display = 'block';
      pitchBtn.innerHTML = '🔄 TRY AGAIN';
      pitchBtn.disabled = false;
      
      nextBtn.style.display = 'none';
      isPlayAgain = true;
    }

    function nextScenario() {
      playSelectSound();
      
      if (currentScenarioIndex === activeScenarios.length - 1) {
        currentScenarioIndex = 0;
      } else {
        currentScenarioIndex++;
      }
      
      resetGame();
      setupScenario();
    }

    // ============================================================
    // RESULT TEXT SHOW
    // ============================================================
    async function showResult(correct, explanation) {
      resultText.textContent = correct ? 'CORRECT!' : 'WRONG!';
      resultText.className = correct ? 'correct' : 'wrong';
      
      const expEl = document.getElementById('result-explanation');
      if (expEl) {
        expEl.textContent = explanation || '';
        expEl.style.opacity = '0';
        expEl.style.transform = 'translateY(10px)';
      }
      
      resultOverlay.style.opacity = '1';
      resultOverlay.style.pointerEvents = 'none';

      // Bounce in
      await animate(300, t => {
        const s = easeOutBounce(t) * 1.05;
        resultText.style.transform = `scale(${s})`;
      });

      if (expEl && explanation) {
        await wait(100);
        expEl.style.opacity = '1';
        expEl.style.transform = 'translateY(0)';
      }

      await wait(3000); // Give enough time to read explanation

      // Fade out
      await animate(300, t => {
        resultOverlay.style.opacity = String(1 - t);
      });
      resultOverlay.style.opacity = '0';
      resultText.style.transform = 'scale(0)';
      if (expEl) expEl.style.opacity = '0';
    }
  </script>
